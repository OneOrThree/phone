name: Test Backend

on:
  workflow_call:

jobs:
  test:
    runs-on: [self-hosted, ci]
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tt_db
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: back
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('back/**/*.gradle*', 'back/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # - uses: actions/cache@v4
      #   with:
      #     path: ~/.gradle/dependency-check-data
      #     key: owasp-db-${{ github.run_id }}
      #     restore-keys: owasp-db-

      - run: chmod +x gradlew

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: ci
        run: ./gradlew test

      # - name: JaCoCo + OWASP
      #   env:
      #     SPRING_PROFILES_ACTIVE: ci
      #   run: ./gradlew jacocoTestReport dependencyCheckAnalyze

      - name: Measure JAR size
        run: |
          ./gradlew bootJar -x test
          du -sb build/libs/*.jar | awk '{print $1}' > jar-size.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: back/build/test-results/
          retention-days: 7

      # - uses: actions/upload-artifact@v4
      #   if: always()
      #   with:
      #     name: coverage-report
      #     path: back/build/reports/jacoco/test/jacocoTestReport.xml
      #     retention-days: 7

      # - uses: actions/upload-artifact@v4
      #   if: always()
      #   with:
      #     name: owasp-report
      #     path: back/build/reports/dependency-check-report.json
      #     retention-days: 7

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jar-size
          path: back/jar-size.txt
          retention-days: 7

name: Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    # PR 코멘트에서 @claude 멘션 시에만 실행 → 불필요한 토큰 소모 없음
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude')
    # 코드 실행 없이 LLM 호출만 → github-hosted로 self-hosted 비용 절약
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # ANTHROPIC_API_KEY: GitHub Repository Settings > Secrets > Actions에 등록 필요

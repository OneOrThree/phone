name: CI

on:
  push:
    branches: [develop]
    paths:
      - 'back/**'
      - '.github/workflows/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'back/**'
      - '.github/workflows/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checkstyle:
    uses: ./.github/workflows/check-style-backend.yml

  spotbugs:
    uses: ./.github/workflows/spot-bugs.yml

  test:
    uses: ./.github/workflows/test-backend.yml

  build-image:
    needs: [test]
    if: github.event_name == 'pull_request' || (github.ref == 'refs/heads/develop' && github.event_name == 'push')
    runs-on: [self-hosted, ci]
    timeout-minutes: 15
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t phone-app:${{ github.sha }} -t phone-app:latest ./back

  pr-report:
    needs: [checkstyle, spotbugs, test, build-image]
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results/

      - uses: actions/download-artifact@v4
        with:
          name: jar-size
          path: jar-size/

      - name: Generate PR comment
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CHECKSTYLE_RESULT: ${{ needs.checkstyle.result }}
          SPOTBUGS_RESULT: ${{ needs.spotbugs.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build-image.result }}
        run: python3 .github/scripts/generate-pr-comment.py

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8');
            const marker = '## CI Report';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.startsWith(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

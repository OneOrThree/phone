name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, dev]
    environment: production
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-phone
          aws-region: ap-northeast-2

      - name: AWS Secrets Manager에서 시크릿 로드
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id oneorthree/phone \
            --region ap-northeast-2 \
            --query SecretString --output text)
          echo "POSTGRES_DB=$(echo $SECRET | jq -r '.POSTGRES_DB')" >> $GITHUB_ENV
          echo "POSTGRES_USER=$(echo $SECRET | jq -r '.POSTGRES_USER')" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=$(echo $SECRET | jq -r '.POSTGRES_PASSWORD')" >> $GITHUB_ENV
          echo "JWT_SECRET=$(echo $SECRET | jq -r '.JWT_SECRET')" >> $GITHUB_ENV

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드
        uses: docker/build-push-action@v6
        with:
          context: ./back
          push: false
          load: true
          tags: |
            phone-app:${{ github.sha }}
            phone-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Compose 배포
        run: |
          docker compose -f docker-compose.dev.yml up -d
          docker compose -f docker-compose.dev.yml ps

      - name: 헬스체크
        run: |
          echo "앱 기동 대기 중..."
          for i in $(seq 1 12); do
            sleep 5
            if curl -sf http://localhost:8080/health; then
              echo "헬스체크 통과"
              exit 0
            fi
            echo "대기 중... ($((i*5))s)"
          done
          docker compose -f docker-compose.dev.yml logs app
          exit 1

      - name: 배포 실패 리포트
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Deployment failed on', new Date().toISOString())

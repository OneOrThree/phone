name: CD

on:
  push:
    branches: [main]
    paths:
      - 'back/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/cd.yml'

# 프로덕션 배포는 직렬화 필수: 동시 배포 시 이전 버전으로 덮어쓰는 사고 방지
concurrency:
  group: cd-production
  cancel-in-progress: false

defaults:
  run:
    working-directory: back

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

jobs:
  deploy:
    runs-on: self-hosted  # 배포 서버에 설치된 runner
    # GitHub Environments: Reviewer 게이트 + DORA 메트릭(Deployment Frequency, Lead Time) 소스
    # GitHub Settings > Environments > production에서 Required Reviewers 설정
    environment: production
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('back/**/*.gradle*', 'back/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Docker 이미지에 포함할 JAR를 CI runner에서 빌드 (Gradle 캐시 활용)
      - name: Build JAR
        run: ./gradlew bootJar -x test

      # DB 비밀번호 등 시크릿은 GitHub Secrets에 저장
      # 서버 .env.prod 파일 대신 환경변수로 직접 주입
      - name: Deploy with docker compose
        working-directory: .  # docker-compose.prod.yml은 루트에 있음
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          docker compose -f docker-compose.prod.yml up --build -d
          docker compose -f docker-compose.prod.yml ps  # 기동 상태 확인

      - name: Health check
        working-directory: .
        run: |
          echo "앱 기동 대기 중..."
          sleep 15
          curl -f http://localhost:8080/health || (docker compose -f docker-compose.prod.yml logs app && exit 1)

      # ── DORA 메트릭 ─────────────────────────────────────────────────────
      # GitHub Environments 사용 시 deployment_status 이벤트 자동 발행
      # Insights > Delivery metrics에서 Deployment Frequency, Lead Time 확인

      - name: Report deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // state: 'failure' → Change Failure Rate, MTTR 집계
            // GitHub Environments가 자동 처리하므로 로그만 남김
            console.log('Deployment failed on', new Date().toISOString())
